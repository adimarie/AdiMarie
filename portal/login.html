<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal · The Animist Apothecary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <div class="portal-login-wrap">
    <div class="portal-login-card">
      <div class="portal-login-brand">
        <h1>The Animist <em>Apothecary</em></h1>
        <p>A space to reflect, tend to your needs,<br>and tend to your journey.</p>
      </div>
      <div class="portal-login-divider"></div>

      <!-- Google OAuth button -->
      <button class="portal-login-btn-google" id="googleLoginBtn">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </button>

      <div class="portal-login-or">or</div>

      <!-- Email/password form -->
      <form id="loginForm" class="portal-form">
        <div class="portal-field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required autocomplete="email" placeholder="your@email.com">
        </div>
        <div class="portal-field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="Password">
        </div>
        <div class="portal-login-error" id="loginError"></div>
        <button type="submit" class="btn-sage" id="loginSubmit" style="width:100%;justify-content:center">Sign In</button>
      </form>

      <div class="portal-login-footer">
        <p>Not yet a client? <a href="../book.html">Begin here →</a></p>
        <p style="margin-top:8px"><a href="../index.html">← Return to main site</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/supabase.js"></script>
  <script src="../shared/auth.js"></script>
  <script>
  (function() {
    // If already logged in, redirect to portal
    if (window.adminSupabase) {
      window.adminSupabase.auth.getSession().then(function(result) {
        if (result.data.session) { window.location.href = 'index.html'; }
      });
    }

    // Google OAuth
    document.getElementById('googleLoginBtn').addEventListener('click', function() {
      window.adminSupabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/portal/callback.html' }
      });
    });

    // Email/password
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('loginEmail').value.trim();
      var pass = document.getElementById('loginPassword').value;
      var errEl = document.getElementById('loginError');
      var btn = document.getElementById('loginSubmit');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in\u2026';
      window.adminSupabase.auth.signInWithPassword({ email: email, password: pass })
        .then(function(result) {
          if (result.error) {
            errEl.textContent = result.error.message || 'Invalid credentials.';
            btn.disabled = false;
            btn.textContent = 'Sign In';
            return;
          }
          window.location.href = 'index.html';
        });
    });
  })();
  </script>
</body>
</html>
